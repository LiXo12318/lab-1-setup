name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'latest'
          cache: 'npm'
          # Точний шлях до файлу залежностей для кешування
          cache-dependency-path: './web/package-lock.json'

      - name: Install dependencies
        # Виконуємо установку саме в папці web
        run: npm ci
        working-directory: ./web

      - name: Run Lint
        run: npm run lint
        working-directory: ./web

      - name: Run Unit Tests
        # Запуск Vitest run для одноразової перевірки в CI
        run: npm run test
        [cite_start]working-directory: ./web [cite: 158]

  build-and-publish:
    needs: quality-checks
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          [cite_start]password: ${{ secrets.GITHUB_TOKEN }} [cite: 117]

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=short
            latest [cite: 263-271]

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          # Точне вказання контексту, де лежить Dockerfile
          context: ./web
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Використання кешу GitHub Actions для прискорення збірки
          cache-from: type=gha
          [cite_start]cache-to: type=gha,mode=max [cite: 272-280, 320]